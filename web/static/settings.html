<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PiBot - Settings</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <circle cx="12" cy="12" r="4"/>
                    <line x1="12" y1="2" x2="12" y2="6"/>
                    <line x1="12" y1="18" x2="12" y2="22"/>
                    <line x1="2" y1="12" x2="6" y2="12"/>
                    <line x1="18" y1="12" x2="22" y2="12"/>
                </svg>
                <span>PiBot</span>
            </div>
            <nav class="nav">
                <a href="/" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                    </svg>
                    <span>Chat</span>
                </a>
                <a href="/" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="4 17 10 11 4 5"/>
                        <line x1="12" y1="19" x2="20" y2="19"/>
                    </svg>
                    <span>Terminal</span>
                </a>
                <a href="/" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                    </svg>
                    <span>Files</span>
                </a>
                <a href="settings.html" class="nav-item active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </svg>
                    <span>Settings</span>
                </a>
            </nav>
        </aside>
        
        <main class="main-content settings-page">
            <div class="settings-container">
                <h1>Settings</h1>
                
                <form id="settings-form">
                    <section class="settings-section">
                        <h2>General</h2>
                        <div class="form-group">
                            <label for="default-provider">Default AI Provider</label>
                            <select id="default-provider" name="default_provider">
                                <option value="openai">OpenAI</option>
                                <option value="anthropic">Anthropic</option>
                                <option value="google">Google Gemini</option>
                                <option value="ollama">Ollama (Local)</option>
                                <option value="qwen">Qwen (Alibaba)</option>
                            </select>
                        </div>
                    </section>

                    <section class="settings-section">
                        <h2>OpenAI</h2>
                        <div class="form-group">
                            <label for="openai-key">API Key</label>
                            <input type="password" id="openai-key" name="openai_key" placeholder="sk-...">
                        </div>
                        <div class="form-group">
                            <label for="openai-model">Model</label>
                            <select id="openai-model" name="openai_model">
                                <option value="gpt-4o">GPT-4o</option>
                                <option value="gpt-4o-mini">GPT-4o Mini</option>
                                <option value="gpt-4-turbo">GPT-4 Turbo</option>
                                <option value="gpt-3.5-turbo">GPT-3.5 Turbo</option>
                            </select>
                        </div>
                    </section>

                    <section class="settings-section">
                        <h2>Anthropic</h2>
                        <div class="form-group">
                            <label for="anthropic-key">API Key</label>
                            <input type="password" id="anthropic-key" name="anthropic_key" placeholder="sk-ant-...">
                        </div>
                        <div class="form-group">
                            <label for="anthropic-model">Model</label>
                            <select id="anthropic-model" name="anthropic_model">
                                <option value="claude-sonnet-4-20250514">Claude Sonnet 4</option>
                                <option value="claude-3-5-sonnet-20241022">Claude 3.5 Sonnet</option>
                                <option value="claude-3-opus-20240229">Claude 3 Opus</option>
                                <option value="claude-3-haiku-20240307">Claude 3 Haiku</option>
                            </select>
                        </div>
                    </section>

                    <section class="settings-section">
                        <h2>Google Gemini</h2>
                        <div class="form-group">
                            <label for="google-key">API Key</label>
                            <input type="password" id="google-key" name="google_key" placeholder="Enter your Google API key">
                        </div>
                        <div class="form-group">
                            <label for="google-model">Model</label>
                            <select id="google-model" name="google_model">
                                <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
                                <option value="gemini-1.5-flash">Gemini 1.5 Flash</option>
                                <option value="gemini-1.0-pro">Gemini 1.0 Pro</option>
                            </select>
                        </div>
                    </section>

                    <section class="settings-section">
                        <h2>Ollama (Local)</h2>
                        <div class="form-group">
                            <label for="ollama-url">Base URL</label>
                            <input type="text" id="ollama-url" name="ollama_base_url" placeholder="http://localhost:11434">
                        </div>
                        <div class="form-group">
                            <label for="ollama-model">Model</label>
                            <input type="text" id="ollama-model" name="ollama_model" placeholder="llama3">
                        </div>
                    </section>

                    <section class="settings-section">
                        <h2>Qwen (Alibaba)</h2>
                        <div class="form-group">
                            <label for="qwen-key">API Key (DashScope)</label>
                            <input type="password" id="qwen-key" name="qwen_key" placeholder="sk-...">
                        </div>
                        <div class="form-group">
                            <label for="qwen-url">Base URL</label>
                            <input type="text" id="qwen-url" name="qwen_base_url" placeholder="https://dashscope.aliyuncs.com/compatible-mode/v1">
                        </div>
                        <div class="form-group">
                            <label for="qwen-model">Model</label>
                            <select id="qwen-model" name="qwen_model">
                                <option value="qwen-plus">Qwen Plus</option>
                                <option value="qwen-turbo">Qwen Turbo</option>
                                <option value="qwen-max">Qwen Max</option>
                                <option value="qwen-max-longcontext">Qwen Max Long Context</option>
                                <option value="qwen2.5-72b-instruct">Qwen 2.5 72B</option>
                                <option value="qwen2.5-32b-instruct">Qwen 2.5 32B</option>
                                <option value="qwen2.5-14b-instruct">Qwen 2.5 14B</option>
                                <option value="qwen2.5-7b-instruct">Qwen 2.5 7B</option>
                            </select>
                        </div>
                    </section>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Save Settings</button>
                        <span id="save-status" class="save-status"></span>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script src="/js/settings.js"></script>
</body>
</html>
